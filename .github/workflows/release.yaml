name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  extract-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Extract version from tag
        id: get_version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building release for ${VERSION}"

  build-linux:
    needs: extract-version
    name: Build Linux Binary
    runs-on: ubuntu-latest
    outputs:
      sha256_bottle: ${{ steps.bottle.outputs.sha256 }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Create archive
        run: |
          VERSION=${{ needs.extract-version.outputs.version }}
          VERSION=${VERSION#v}  # Remove 'v' prefix
          mkdir -p release
          cp target/release/rona release/
          cd release
          tar -czvf rona-${VERSION}-linux-x86_64.tar.gz rona
          cd ..

      - name: Create Homebrew bottle
        id: bottle
        run: |
          VERSION=${{ needs.extract-version.outputs.version }}
          VERSION=${VERSION#v}
          mkdir -p rona/${VERSION}/bin
          cp target/release/rona rona/${VERSION}/bin/
          tar -czf rona-${VERSION}.x86_64_linux.bottle.tar.gz rona/
          SHA256=$(shasum -a 256 rona-${VERSION}.x86_64_linux.bottle.tar.gz | cut -d ' ' -f 1)
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"

      - name: Generate Release Body
        run: |
          cp .github/workflows/release_body.md release_body.md
          VERSION=${{ needs.extract-version.outputs.version }}
          VERSION=${VERSION#v}  # Remove 'v' prefix
          sed -i.bak "s/\${GITHUB_REF#refs\/tags\/v}/${VERSION}/g" release_body.md

      - name: Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.extract-version.outputs.version }}
          artifacts: "release/rona-*-linux-x86_64.tar.gz,rona-*.x86_64_linux.bottle.tar.gz"
          bodyFile: release_body.md
          generateReleaseNotes: true
          allowUpdates: true
          updateOnlyUnreleased: false

  build-macos-intel:
    needs: extract-version
    name: Build macOS Intel Binary
    runs-on: macos-15-intel
    outputs:
      sha256_bottle: ${{ steps.bottle.outputs.sha256 }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Build release binary
        run: cargo build --release --target x86_64-apple-darwin

      - name: Create archive
        run: |
          VERSION=${{ needs.extract-version.outputs.version }}
          VERSION=${VERSION#v}  # Remove 'v' prefix
          mkdir -p release
          cp target/x86_64-apple-darwin/release/rona release/
          cd release
          tar -czvf rona-${VERSION}-macos-x86_64.tar.gz rona
          cd ..

      - name: Create Homebrew bottle
        id: bottle
        run: |
          VERSION=${{ needs.extract-version.outputs.version }}
          VERSION=${VERSION#v}
          mkdir -p rona/${VERSION}/bin
          cp target/x86_64-apple-darwin/release/rona rona/${VERSION}/bin/
          tar -czf rona-${VERSION}.sequoia.bottle.tar.gz rona/
          SHA256=$(shasum -a 256 rona-${VERSION}.sequoia.bottle.tar.gz | cut -d ' ' -f 1)
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"

      - name: Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.extract-version.outputs.version }}
          artifacts: "release/rona-*-macos-x86_64.tar.gz,rona-*.sequoia.bottle.tar.gz"
          allowUpdates: true
          updateOnlyUnreleased: false

  build-macos-arm:
    needs: extract-version
    name: Build macOS Apple Silicon Binary
    runs-on: macos-latest
    outputs:
      sha256_bottle: ${{ steps.bottle.outputs.sha256 }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build release binary
        run: cargo build --release --target aarch64-apple-darwin

      - name: Create archive
        run: |
          VERSION=${{ needs.extract-version.outputs.version }}
          VERSION=${VERSION#v}  # Remove 'v' prefix
          mkdir -p release
          cp target/aarch64-apple-darwin/release/rona release/
          cd release
          tar -czvf rona-${VERSION}-macos-arm64.tar.gz rona
          cd ..

      - name: Create Homebrew bottle
        id: bottle
        run: |
          VERSION=${{ needs.extract-version.outputs.version }}
          VERSION=${VERSION#v}
          mkdir -p rona/${VERSION}/bin
          cp target/aarch64-apple-darwin/release/rona rona/${VERSION}/bin/
          tar -czf rona-${VERSION}.arm64_sequoia.bottle.tar.gz rona/
          SHA256=$(shasum -a 256 rona-${VERSION}.arm64_sequoia.bottle.tar.gz | cut -d ' ' -f 1)
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"

      - name: Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.extract-version.outputs.version }}
          artifacts: "release/rona-*-macos-arm64.tar.gz,rona-*.arm64_sequoia.bottle.tar.gz"
          allowUpdates: true
          updateOnlyUnreleased: false

  publish-crates-io:
    name: Publish to crates.io
    needs: [extract-version, build-linux, build-macos-intel, build-macos-arm]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        env:
          CRATES_IO_TOKEN: ${{ secrets.CRATES_TOKEN }}
        run: |
          VERSION=${{ needs.extract-version.outputs.version }}
          VERSION=${VERSION#v}
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://crates.io/api/v1/crates/rona/${VERSION}")
          if [ "${HTTP_STATUS}" = "200" ]; then
            echo "Version ${VERSION} already published on crates.io, skipping."
            exit 0
          fi
          cargo login $CRATES_IO_TOKEN
          cargo publish --dry-run
          cargo publish

  notify-homebrew:
    name: Notify Homebrew Tap
    needs: [extract-version, build-linux, build-macos-intel, build-macos-arm]
    runs-on: ubuntu-latest
    steps:
      - name: Check if PR already exists in tap (guard)
        id: guard
        env:
          TAG: ${{ needs.extract-version.outputs.version }}
          TOKEN: ${{ secrets.RONA_PRS_TOKEN }}
        run: |
          OWNER="rona-rs"
          REPO="homebrew-rona"
          HEAD="${OWNER}:bump/rona-${TAG}"
          RES=$(curl -s -H "Authorization: token ${TOKEN}" \
            "https://api.github.com/repos/${OWNER}/${REPO}/pulls?state=open&head=${HEAD}")
          COUNT=$(echo "$RES" | jq 'length')
          if [ "$COUNT" -gt 0 ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Found existing PR for ${HEAD}, skipping dispatch"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No existing PR for ${HEAD}, will dispatch"
          fi
      - name: Dispatch update to homebrew-rona
        if: steps.guard.outputs.exists == 'false'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.RONA_PRS_TOKEN }}
          repository: rona-rs/homebrew-rona
          event-type: rona-release
          client-payload: |
            {
              "tag": "${{ needs.extract-version.outputs.version }}",
              "tarball_url": "https://github.com/rona-rs/rona/archive/refs/tags/${{ needs.extract-version.outputs.version }}.tar.gz",
              "sha256_arm64_sequoia": "${{ needs.build-macos-arm.outputs.sha256_bottle }}",
              "sha256_sequoia": "${{ needs.build-macos-intel.outputs.sha256_bottle }}",
              "sha256_x86_64_linux": "${{ needs.build-linux.outputs.sha256_bottle }}"
            }
